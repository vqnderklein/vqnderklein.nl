name: Build & Deploy

on:
  push:
    branches: [sveltekit-rework]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: deploy   

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build frontend
        run: |
          docker build -t ghcr.io/${{ github.repository }}-frontend:${{ github.sha }} ./frontend

      - name: Push frontend
        run: docker push ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}

      - name: Build backend
        run: |
          docker build -t ghcr.io/${{ github.repository }}-backend:${{ github.sha }} ./backend

      - name: Push backend
        run: docker push ghcr.io/${{ github.repository }}-backend:${{ github.sha }}

      - name: Copy docker-compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/opt/vqnderklein.nl/"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/vqnderklein.nl/

            cat <<EOF > .env
            IMAGE_TAG=${{ github.sha }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }})
            MYSQL_DATABASE=appdb
            MYSQL_USER=appuser
            MYSQL_PASSWORD=$(openssl rand -hex 16)
            IMAGE_TAG=${{ github.sha }}
            EOF

            docker login ghcr.io -u GH_USER -p ${{ secrets.GHCR_PAT }}

            docker compose pull
            docker compose up -d
