name: Build & Deploy

on:
  push:
    branches: [sveltekit-rework]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build frontend
        run: |
          docker build -t ghcr.io/${{ github.repository }}-frontend:${{ github.sha }} ./frontend

      - name: Push frontend
        run: docker push ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}

      - name: Build backend
        run: |
          docker build -t ghcr.io/${{ github.repository }}-backend:${{ github.sha }} ./backend

      - name: Push backend
        run: docker push ghcr.io/${{ github.repository }}-backend:${{ github.sha }}

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/app/${{ github.repository }}

            echo "IMAGE_TAG=${{ github.sha }}" > .env

            docker login ghcr.io -u GH_USER -p ${{ secrets.GHCR_PAT }}

            docker compose pull
            docker compose up -d
