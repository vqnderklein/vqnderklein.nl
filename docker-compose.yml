services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`test.vqndr.nl`)"
      - "traefik.http.services.app.loadbalancer.server.port=80"

  frontend:
    image: ghcr.io/vqnderklein/vqnderklein.nl-frontend:${IMAGE_TAG}
    networks:
      - web

  backend:
    image: ghcr.io/vqnderklein/vqnderklein.nl-backend:${IMAGE_TAG}
    networks:
      - web

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:

networks:
  web:
    external: true
