services:
  nginx:
    image: nginx:alpine
    container_name: vqnderklein-nginx
    networks:
      - web
      - internal
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.app.rule=Host(`test.vqndr.nl`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=myresolver"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.services.app.loadbalancer.server.port=80"

  frontend:
    image: ghcr.io/vqnderklein/vqnderklein.nl-frontend:${IMAGE_TAG}
    container_name: vqnderklein-frontend
    restart: unless-stopped
    networks:
      - internal

  backend:
    image: ghcr.io/vqnderklein/vqnderklein.nl-backend:${IMAGE_TAG}
    container_name: vqnderklein-backend
    restart: unless-stopped
    env_file: 
      - ./.env
    networks:
      - internal

  db:
    image: mysql:8
    container_name: vqnderklein-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - internal
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro

volumes:
  db_data:

networks:
  web:
    external: true
  internal:
