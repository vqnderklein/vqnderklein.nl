services:
  nginx:
    image: nginx:alpine
    container_name: vqnderklein-nginx
    networks:
      - web
      - internal
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.service=app"
      - "traefik.docker.network=web"
      - "traefik.http.routers.app.rule=Host(`vqnderklein.nl`) || Host(`www.vqnderklein.nl`)"
      - "traefik.http.middlewares.redirect-www.redirectregex.regex=^https?://www\\.(.*)"
      - "traefik.http.middlewares.redirect-www.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.redirect-www.redirectregex.permanent=true"
      - "traefik.http.routers.app.middlewares=redirect-www"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=myresolver"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.services.app.loadbalancer.server.port=80"

  frontend:
    image: ghcr.io/vqnderklein/vqnderklein.nl-frontend:${IMAGE_TAG}
    container_name: vqnderklein-frontend
    restart: unless-stopped
    networks:
      - internal

  backend:
    image: ghcr.io/vqnderklein/vqnderklein.nl-backend:${IMAGE_TAG}
    container_name: vqnderklein-backend
    restart: unless-stopped
    env_file:
      - ./.env
    networks:
      - internal

networks:
  web:
    external: true
  internal:
