services:
  nginx:
    image: nginx:alpine
    container_name: vqnderklein-nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`test.vqndr.nl`)"
      - "traefik.http.services.app.loadbalancer.server.port=80"

  frontend:
    build: ./frontend
    container_name: vqnderklein-frontend
    command: npm run dev -- --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    networks:
      - web
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build: ./backend
    container_name: vqnderklein-backend
    networks:
      - web
    env_file: 
      - ./.env
    develop:
      watch:
        - action: rebuild
          path: ./backend/src

networks:
  web:
